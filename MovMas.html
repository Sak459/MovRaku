  <meta charset="UTF-8" />

  <title>Seccion Ver Mas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #000000;
      color: #ddd;
      min-height: 100vh;
    }

    header {
      background-color: #000000;
      color: #fff;
      text-align: center;
      padding: 1.5rem;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 500;
    }

    .catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      gap: 5px;
      padding: 10px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .serie {
      background-color: var(--card-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .poster a {
      display: block;
      width: 100%;
      height: 185px;
      overflow: hidden;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .poster img:hover {
      transform: scale(1.04);
    }

    .titulo-serie {
      padding: 5px;
      text-align: center;
      background-color: #000000;
      color: #ffffff;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background-color: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: #1f1f1f;
  border-radius: 16px;
  padding: 35px 30px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  transform: translateY(30px);
  opacity: 0;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.modal-overlay.active .modal {
  transform: translateY(0);
  opacity: 1;
}

.modal h2 {
  margin: 0;
  color: #ff4d4d;
  font-size: 22px;
}

.modal p {
  font-size: 16px;
  margin: 15px 0;
  color: #ccc;
}

.modal ul {
  text-align: left;
  margin: 10px 0 0 0;
  padding-left: 20px;
  color: #999;
  font-size: 14px;
}

.modal button {
  margin-top: 20px;
  padding: 12px 24px;
  background-color: #ff4d4d;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: not-allowed;
  opacity: 0.6;
}

/* Toast Notification */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #28a745;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 10000;
}

    -webkit-user-select: none; /* Safari */

      /* Media Queries para pantallas más pequeñas */

}

.loading.hide{
    opacity:0;
    visibility:hidden;

.spinner{
    width:80px;
    height:80px;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #ff375e;
    border-radius:50%;

}

    to{
        transform:rotate(360deg);

<script>
const loading = document.getElementById("loading");

const API_KEY = "b6083b855479a79fd9acdb0a2789f126";
const TMDB = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";

function hideLoading(){
    loading.classList.add("hide");
}

async function cargarPeliculas(){

    const tarjetas = document.querySelectorAll(".serie");

    const promesas = [];

    tarjetas.forEach(tarjeta=>{

        const id = tarjeta.dataset.id;
        const tipo = tarjeta.dataset.tipo;

        if(!id || !tipo) return;

        const p = fetch(
            `${TMDB}/${tipo}/${id}?api_key=${API_KEY}&language=es-ES`
        )
        .then(r=>r.json())
        .then(datos=>{

            const titulo =
    datos.title ||
    datos.name ||
    "Sin título";

// Mostrar un título recortado si supera los 20 caracteres
const tituloMostrar =
    titulo.length > 25
        ? titulo.substring(0, 25).trim() + "..."
        : titulo;

tarjeta.querySelector(".titulo-serie").textContent = tituloMostrar;

            const img = tarjeta.querySelector("img");

            img.src = IMG + datos.poster_path;
            img.alt = titulo;

        })
        .catch(console.error);

        promesas.push(p);

    });

    await Promise.all(promesas);

}

(async()=>{

    await cargarPeliculas();

    const imagenes = document.querySelectorAll(".poster img");

    let cargadas = 0;

    function comprobar(){

        cargadas++;

        if(cargadas === imagenes.length){

            setTimeout(hideLoading,500);

        }

    }

    imagenes.forEach(img=>{

        if(img.complete){

            comprobar();

        }else{

            img.onload = comprobar;
            img.onerror = comprobar;

        }

    });

})();
</script>

<script>
  const modal = document.getElementById("connectionModal");
  const toast = document.getElementById("toast");
  let wasOffline = false;

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function updateConnectionStatus() {
    if (!navigator.onLine) {
      modal.classList.add("active");
      wasOffline = true;
    } else {
      modal.classList.remove("active");
      if (wasOffline) {
        showToast("✅ ¡Conexión restaurada!");
        wasOffline = false;
      }
    }
  }

  window.addEventListener("load", updateConnectionStatus);
  window.addEventListener("offline", updateConnectionStatus);
  window.addEventListener("online", updateConnectionStatus);
</script>
